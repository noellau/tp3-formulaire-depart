<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <form action="" class="form" id="form">
            <fieldset class="form__format">
                <legend class="format__legende">Fromat de la brochure</legend>
                <input type="radio" id="imprime" name="imprime">
                <label for="imprime"><img src="images/icon-file-print.svg" alt="">Imprimé</label>
                <input type="radio" id="pdf" name="pdf">
                <label for="pdf"><img src="images/icon-file-pdf.svg" alt="">PDF</label>
                <input type="radio" id="epub" name="epub">
                <label for="epub"><img src="images/icon-file-epub.svg" alt="">ePub</label>                                
            </fieldset>
            <fieldset class="form__contact">
                <legend class="contact__legende">Informations de contact</legend>
                <p>
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom">
                <label for="nom">Nom</label>       
                <input type="text" id="nom" name="nom">
                </p>
                <p>
                <label for="courriel">Courriel</label>
                <input type="email" id="courriel" name="courriel">
                </p>
                <p>
                <label for="telephone">Téléphone</label>                                                        
                <input type="tel" id="telephone" name="telephone">
                </p>
            </fieldset>
        </form>
    </body>
</html>
