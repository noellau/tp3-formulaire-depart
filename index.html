<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <header>
            <h2 class="sous_titre">Publication gratuite</h2>
            <h1 class="titre_principale">Commander une <i>brochure</i> gratuite</h1>
        </header>
        <form action="index.html" class="form" id="form">
            <fieldset class="form__format">
                <legend class="format__legende">Fromat de la brochure</legend>
                <ul>
                    <li>
                        <input type="radio" id="imprime" name="format">
                        <label for="imprime"><img src="images/icon-file-print.svg" alt="">Imprimé</label>  
                    </li>
                    <li>
                        <input type="radio" id="pdf" name="format">
                        <label for="pdf"><img src="images/icon-file-pdf.svg" alt="">PDF</label>  
                    </li>
                    <li>
                        <input type="radio" id="epub" name="format">
                        <label for="epub"><img src="images/icon-file-epub.svg" alt="">ePub</label>       
                    </li>
                </ul>
                <p class="mesddage_erreur"></p>                           
            </fieldset>
            <fieldset class="form__contact">
                <legend class="contact__legende">Informations de contact</legend>
                <p>
                    <label for="prenom">Prénom</label>
                <p>
                    <input type="text" id="prenom" name="prenom" required>
                </p>   
                <p class="champ-erreur"></p>
                <p> 
                    <label for="nom">Nom</label>       
                </p>
                <p>
                    <input type="text" id="nom" name="nom">
                </p>
                <p class="champ-erreur"></p>
                <p>
                    <label for="courriel">Courriel (exemple@domaine.com)</label>
                </p>
                <p>
                    <input type="email" id="courriel" name="courriel" required>
                </p>
                <p class="champ-erreur"></p>
                <p>
                    <label for="telephone">Téléphone (514 555 0123)</label>   
                </p>
                <p>
                    <input type="tel" id="telephone" name="telephone">
                </p>
                <p class="champ-erreur"></p>
            </fieldset>
            <fieldset class="form__postale">
                <legend class="postale__legende">Informatioins postales</legend>
                <p>
                    <label for="adresse">Adresse (123, rue Principale)</label>
                </p>
                <p>
                    <input type="text" id="adresse" name="adresse" required>
                </p>
                <p class="champ-erreur"></p>
                <p>
                    <p>
                        <label for="pays">Pays</label>
                    </p>
                    <select name="pays" id="pays" required>
                        <option value="">-- Sélectionner --</option>
                        <option value="canada">Canada</option>
                        <option value="etatsunis">États-Unis</option>
                    </select>
                </p>
                <p class="champ-erreur"></p>
                <p>
                    <p>
                        <label for="province_etat">Province ou État</label>
                    </p>                   
                    <select name="province_etat" id="province_etat" required>
                        <option value="">-- Sélectionner --</option>
                        <optgroup label="Canada">
                        <option value="quebec">Québec</option>
                        </optgroup>
                        <optgroup label="États-Unis">
                        <option value="newyork">New York</option>
                        </optgroup>
                    </select>                    
                </p>
                <p class="champ-erreur"></p>
                <p>
                    <p>
                        <label for="code_postal">Code postal (A1A 1A1)</label>
                    </p>                    
                    <input type="text" id="code_postal" name="code_postal" required>
                </p>
                <p class="champ-erreur"></p>
            </fieldset>
            <p>
                <input type="checkbox" id="recevoir_courriel" name="recevoir_courriel">
                <label for="recevoir_courriel">Je désire recevoir des informations mensuelles par courriel</label>
            </p>
            <p>
                <input type="submit" name="btnCommander" value="Commander">
            </p>
        </form>
    </body>
</html>
